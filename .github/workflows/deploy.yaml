name: Astronomer Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Astro Cloud
        uses: astronomer/deploy-action@v0.4
        env:
          ASTRO_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}